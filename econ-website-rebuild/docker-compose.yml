services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: econ
      POSTGRES_PASSWORD: econ
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U econ"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URI: postgresql://econ:econ@postgres:5432/econ_payload
      PAYLOAD_SECRET: econ-demo-secret-do-not-use-in-prod
      NEXT_PUBLIC_MEDUSA_BACKEND_URL: http://localhost:9000
      MEDUSA_BACKEND_INTERNAL_URL: http://medusa:9000
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./seed:/app/seed
      - ./payload.config.ts:/app/payload.config.ts
      - ./package.json:/app/package.json

  medusa:
    build:
      context: .
      dockerfile: medusa-backend/Dockerfile
    ports:
      - "9000:9000"
    environment:
      DATABASE_URL: postgresql://econ:econ@postgres:5432/econ_medusa?sslmode=disable
      JWT_SECRET: econ-demo-jwt-secret
      COOKIE_SECRET: econ-demo-cookie-secret
      MEDUSA_ADMIN_EMAIL: admin@econ-demo.com
      MEDUSA_ADMIN_PASSWORD: Admin@1234
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
